name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Least-privilege permissions for GITHUB_TOKEN
permissions:
  contents: write
  actions: read

# Cancel redundant runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - cl_x64_release
          - cl_x86_release
          - cl_ARM64_release
        include:
          - build: cl_x64_release
            arch: amd64
            platform: x64
          - build: cl_x86_release
            arch: amd64_x86
            platform: x86
          - build: cl_ARM64_release
            arch: amd64_arm64
            platform: ARM64

    env:
      BUILD_TYPE: RelWithDebInfo

    runs-on: windows-2022
    timeout-minutes: 30

    # Pass version to downstream jobs via outputs
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version_short: ${{ steps.get-version.outputs.version_short }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Get version
        id: get-version
        shell: bash
        run: |
          VERSION_MAJOR=$(grep "NETBOX_VERSION_MAJOR" src/NetBox/plugin_version.hpp | sed -e "s/^.* NETBOX_VERSION_MAJOR\s*\([0-9]\+\)/\1/g")
          VERSION_MINOR=$(grep "NETBOX_VERSION_MINOR" src/NetBox/plugin_version.hpp | sed -e "s/^.* NETBOX_VERSION_MINOR\s*\([0-9]\+\)/\1/g")
          VERSION_PATCH=$(grep "NETBOX_VERSION_PATCH" src/NetBox/plugin_version.hpp | sed -e "s/^.* NETBOX_VERSION_PATCH\s*\([0-9]\+\)/\1/g")
          VERSION_BUILD=$(grep "NETBOX_VERSION_BUILD" src/NetBox/plugin_version.hpp | sed -e "s/^.* NETBOX_VERSION_BUILD\s*\([0-9]\+\)/\1/g")
          echo "version=$VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH.$VERSION_BUILD.$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_short=$VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH.$VERSION_BUILD" >> "$GITHUB_OUTPUT"
          # Also set for current job's steps
          echo "version=$VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH.$VERSION_BUILD.$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "version_short=$VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH.$VERSION_BUILD" >> "$GITHUB_ENV"

      - name: Set artifact names
        shell: bash
        run: |
          echo "netbox_name=NetBox.${{ matrix.platform }}.${{ env.version }}.7z" >> "$GITHUB_ENV"
          echo "netbox_pdb_name=NetBox.${{ matrix.platform }}.${{ env.version }}.pdb.7z" >> "$GITHUB_ENV"

      - name: Add C++ build tools to PATH
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build/CMakeFiles
            build/.ninja_*
          key: ${{ runner.os }}-cmake-${{ matrix.platform }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.platform }}-
            ${{ runner.os }}-cmake-

      - name: Create Build folder
        run: cmake -E make_directory build

      - name: Configure CMake
        shell: bash
        working-directory: build
        run: >
          cmake -G "Ninja"
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE
          -DPROJECT_PLATFORM=${{ matrix.platform }}
          -DOPT_CREATE_PLUGIN_DIR=ON
          $GITHUB_WORKSPACE

      - name: Build
        working-directory: build
        shell: bash
        run: cmake --build . --config $BUILD_TYPE --target all -j4

      - name: Pack artifacts
        shell: bash
        run: |
          7z a -m0=LZMA -mf=BCJ2 -mx9 "${{ env.netbox_name }}" ./Far3_${{ matrix.platform }}/Plugins/* -xr!*.pdb
          if [[ -f ./Far3_${{ matrix.platform }}/Plugins/NetBox/NetBox.pdb ]]; then
            7z a -m0=LZMA -mf=off -mx9 "${{ env.netbox_pdb_name }}" ./Far3_${{ matrix.platform }}/Plugins/NetBox/NetBox.pdb
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: FarNetBox.${{ matrix.platform }}
          path: ./*.7z
          overwrite: true
          retention-days: 30

  create-release:
    needs: [build]
    runs-on: windows-2022
    timeout-minutes: 10

    # Receive version from build job outputs — eliminates duplicate extraction
    env:
      version: ${{ needs.build.outputs.version }}
      version_short: ${{ needs.build.outputs.version_short }}

    steps:
      - name: Download archives
        uses: actions/download-artifact@v6
        with:
          pattern: FarNetBox.*
          path: FarNetBox/
          merge-multiple: true

      - name: Verify downloaded files
        run: ls -R FarNetBox/

      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "v${{ env.version }}" \
            --draft \
            --generate-notes \
            --title "NetBox ${{ env.version_short }}" \
            FarNetBox/*.7z
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
